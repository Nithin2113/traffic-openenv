name: traffic-openenv
description: Seedable 4-way traffic signal optimization environment with adaptive-control benchmarks
version: 2.0.0

environment:
  entrypoint: app.env:TrafficEnv

inference:
  entrypoint: inference:main

tasks:
  - name: easy
    description: Low traffic density with light stochastic arrivals
  - name: medium
    description: Moderate traffic pressure with asymmetric arrivals
  - name: hard
    description: High congestion with sustained arrivals
